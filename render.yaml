services:
  - type: web
    name: lixi-backend
    env: python
    region: frankfurt
    plan: free
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lixi-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production

databases:
  - name: lixi-db
    databaseName: lixi
    user: lixi_user
    plan: free
    region: frankfurt
